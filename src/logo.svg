<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Badge Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded Base Card (Solid Dark Background instead of Gradient) -->
  <rect width="120" height="120" x="4" y="4" rx="28" fill="#131022" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2"/>

  <!-- Codeforces Logo Bars (Centered and Scaled) -->
  <g transform="translate(22, 22) scale(3.5)">
    <!-- Left Bar (Red) -->
    <path d="M4.5 7.5C5.328 7.5 6 8.172 6 9v10.5c0 .828-.672 1.5-1.5 1.5h-3C.673 21 0 20.328 0 19.5V9c0-.828.673-1.5 1.5-1.5h3z" fill="#E74C3C"/>
    
    <!-- Middle Bar (Blue) -->
    <path d="M13.5 3c.828 0 1.5.672 1.5 1.5v15c0 .828-.672 1.5-1.5 1.5h-3c-.827 0-1.5-.672-1.5-1.5v-15c0-.828.673-1.5 1.5-1.5h3z" fill="#3182CE"/>
    
    <!-- Right Bar (Yellow) -->
    <path d="M22.5 10.5c.828 0 1.5.672 1.5 1.5v7.5c0 .828-.672 1.5-1.5 1.5h-3c-.828 0-1.5-.672-1.5-1.5V12c0-.828.672-1.5 1.5-1.5h3z" fill="#F1C40F"/>
  </g>

  <!-- PDF logo in the bottom right (Solid red Acrobat-style icon) -->
  <g transform="translate(74, 74) scale(0.08203)" filter="url(#shadow)">
    <!-- Red background rect -->
    <rect width="512" height="512" rx="76.8" fill="#c80a0a" stroke="#ffffff" stroke-width="24"/>
    <!-- White PDF loop path -->
    <path fill="#ffffff" d="M413 302c-9-10-29-15-56-15-16 0-33 2-53 5a252 252 0 0 1-52-69c10-30 17-59 17-81 0-17-6-44-30-44-7 0-13 4-17 10-10 18-6 58 13 100a898 898 0 0 1-50 117c-53 22-88 46-91 65-2 9 4 24 25 24 31 0 65-45 91-91a626 626 0 0 1 92-24c38 33 71 38 87 38 32 0 35-23 24-35zM227 111c8-12 26-8 26 16 0 16-5 42-15 72-18-42-18-75-11-88zM100 391c3-16 33-38 80-57-26 44-52 72-68 72-10 0-13-9-12-15zm197-98a574 574 0 0 0-83 22 453 453 0 0 0 36-84 327 327 0 0 0 47 62zm13 4c32-5 59-4 71-2 29 6 19 41-13 33-23-5-42-18-58-31z"/>
