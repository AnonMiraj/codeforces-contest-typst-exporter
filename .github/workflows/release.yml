name: Release Exporter Targets

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    name: Build and Upload Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install SVG Renderer
        run: npm install @resvg/resvg-js

      - name: Build Targets
        run: node build.js

      - name: Package Distributions
        run: |
          cd dist/chromium && zip -r ../chromium-extension.zip * && cd ../..
          cd dist/firefox && zip -r ../firefox-extension.zip * && cd ../..

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || 'latest' }}
          name: ${{ github.event_name == 'release' && github.event.release.name || 'Latest Development Build' }}
          body: ${{ github.event_name == 'release' && github.event.release.body || 'This release is automatically compiled and updated on every push to the main branch.' }}
          prerelease: ${{ github.event_name != 'release' }}
          files: |
            dist/chromium-extension.zip
            dist/firefox-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
